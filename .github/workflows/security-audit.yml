name: Security Audit

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  npm-audit:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --omit=dev --audit-level=moderate
        continue-on-error: true
        id: npm-audit

      - name: Run npm audit (production only)
        run: npm audit --omit=dev --json > npm-audit-prod.json || true
        id: npm-audit-prod

      - name: Check for vulnerabilities
        run: |
          node -e '
            const fs = require("fs");
            const report = JSON.parse(fs.readFileSync("npm-audit-prod.json", "utf8"));
            const allowlist = new Set([
              "GHSA-q3j6-qgpj-74h6", // fast-uri
              "GHSA-v39h-62p7-jpjc", // fast-uri
              "GHSA-qx2v-qp2m-jg93", // postcss via next
              "GHSA-8h8q-6873-q5fj", // next
              "GHSA-26hh-7cqf-hhc6", // next
              "GHSA-mg66-mrh9-m8jx", // next
              "GHSA-c4j6-fc7j-m34r", // next
              "GHSA-492v-c6pp-mqqv", // next
              "GHSA-267c-6grr-h53f", // next
              "GHSA-36qx-fr4f-26g5"  // next
            ]);
            const findings = [];
            for (const [name, vuln] of Object.entries(report.vulnerabilities || {})) {
              const advisories = (vuln.via || []).filter(v => typeof v === "object");
              const blocking = advisories.filter(a => {
                const id = a.url?.split("/").pop();
                return (a.severity === "high" || a.severity === "critical") && !allowlist.has(id);
              });
              if (blocking.length) findings.push({name, blocking});
            }
            if (findings.length) {
              console.error("::error::High or critical vulnerabilities found in production dependencies");
              for (const f of findings) {
                for (const b of f.blocking) {
                  console.error(`- ${f.name}: ${b.url} (${b.severity})`);
                }
              }
              process.exit(1);
            }
            console.log("No non-allowlisted high/critical production vulnerabilities found.");
          '

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        continue-on-error: true
        with:
          fail-on-severity: moderate
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC, 0BSD
